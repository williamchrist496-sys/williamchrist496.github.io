<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Sports HQ</title>
    <style>
        :root {
            --bg-main: #0b0e11;
            --bg-card: #151a22;
            --bg-nav: #1e2530;
            --accent: #00ff88;
            --text-main: #ffffff;
            --text-muted: #8a99ad;
            --border: #242f41;
            --modal-overlay: rgba(5, 7, 10, 0.85);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            padding-bottom: 60px;
        }

        .app-header {
            background-color: var(--bg-nav);
            padding: 15px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .app-title {
            font-size: 1.4rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(90deg, #fff, var(--text-muted));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .refresh-indicator {
            font-size: 0.75rem;
            color: var(--accent);
            background: rgba(0, 255, 136, 0.1);
            padding: 4px 8px;
            border-radius: 12px;
            font-weight: 600;
        }

        .app-layout {
            display: grid;
            grid-template-columns: 1fr;
            gap: 25px;
            max-width: 1400px;
            margin: 25px auto;
            padding: 0 20px;
        }

        @media(min-width: 992px) {
            .app-layout { grid-template-columns: 1.6fr 1fr; }
        }

        .league-selector {
            display: flex;
            background-color: var(--bg-nav);
            padding: 6px;
            border-radius: 12px;
            gap: 5px;
            margin-bottom: 15px;
            border: 1px solid var(--border);
        }

        .league-btn {
            flex: 1;
            background: none;
            border: none;
            color: var(--text-muted);
            padding: 12px;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            font-size: 0.9rem;
            transition: background 0.15s;
        }

        .league-btn.active {
            background-color: var(--bg-card);
            color: var(--accent);
        }

        .filter-bar {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
        }

        .filter-chip {
            background: var(--bg-nav);
            border: 1px solid var(--border);
            color: var(--text-muted);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
        }

        .filter-chip.active {
            background: var(--accent);
            color: var(--bg-main);
            border-color: var(--accent);
        }

        .panel {
            background-color: var(--bg-card);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid var(--border);
            align-self: start;
        }

        .panel-title {
            font-size: 1.1rem;
            font-weight: 700;
            margin-top: 0;
            margin-bottom: 15px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 10px;
        }

        .scores-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .game-card {
            background-color: var(--bg-nav);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
        }

        .teams-col {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .team-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-right: 15px;
        }

        .team-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .team-logo {
            width: 28px;
            height: 28px;
            object-fit: contain;
        }

        .team-name { font-weight: 600; font-size: 1rem; }
        .team-record { font-size: 0.75rem; color: var(--text-muted); margin-left: 6px; }
        .team-score { font-size: 1.3rem; font-weight: 800; font-variant-numeric: tabular-nums; }
        .game-card.live .team-score { color: var(--accent); }
        .status-col { width: 110px; text-align: right; border-left: 1px solid var(--border); padding-left: 12px; }
        .status-text { font-size: 0.8rem; font-weight: 700; text-transform: uppercase; line-height: 1.2; display: block; }
        .game-card.live .status-text { color: var(--accent); }

        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: var(--modal-overlay);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 15px;
            backdrop-filter: blur(4px);
        }

        .modal-content {
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            width: 100%;
            max-width: 700px;
            border-radius: 20px;
            padding: 25px;
            max-height: 85vh;
            overflow-y: auto;
            position: relative;
        }

        .close-modal-btn {
            position: absolute;
            top: 15px; right: 20px;
            background: none; border: none;
            color: var(--text-muted); font-size: 1.5rem;
            cursor: pointer;
        }

        .stat-board-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--bg-nav);
            padding: 20px;
            border-radius: 16px;
            margin-bottom: 20px;
            border: 1px solid var(--border);
        }

        .board-team { text-align: center; flex: 1; }
        .board-team img { width: 55px; height: 55px; object-fit: contain; }
        .board-team-name { font-size: 1rem; font-weight: 700; margin-top: 8px; }
        .board-center-score { font-size: 2.2rem; font-weight: 900; text-align: center; padding: 0 20px; font-variant-numeric: tabular-nums; }
        .board-status-badge { font-size: 0.8rem; color: var(--accent); font-weight: 700; margin-top: 6px; text-transform: uppercase; }
        
        .stat-section-title { font-size: 0.85rem; font-weight: 700; text-transform: uppercase; color: var(--text-muted); margin: 20px 0 10px 0; }
        .stat-row-data { display: flex; justify-content: space-between; padding: 10px 8px; border-bottom: 1px solid var(--border); font-size: 0.95rem; }
        .stat-label { color: var(--text-muted); font-weight: 500; }
        .play-by-play-box { background: #0b0e11; padding: 15px; border-radius: 12px; border-left: 4px solid var(--accent); font-size: 0.9rem; line-height: 1.5; }

        .news-card { border-bottom: 1px solid var(--border); padding-bottom: 14px; margin-bottom: 14px; }
        .news-link { color: var(--text-main); text-decoration: none; font-weight: 600; display: block; margin-bottom: 5px; font-size: 1rem; }
        .news-link:hover { color: var(--accent); }
        .news-desc { font-size: 0.85rem; color: var(--text-muted); margin: 0; line-height: 1.4; }
        .empty-state { text-align: center; color: var(--text-muted); padding: 30px 0; font-size: 0.9rem; }
    </style>
</head>
<body>

    <header class="app-header">
        <div class="app-title">PRO SPORTS HQ</div>
        <div class="refresh-indicator" id="refresh-time">Engine Synced</div>
    </header>

    <main class="app-layout">
        <div>
            <nav class="league-selector">
                <button class="league-btn active" id="btn-mlb" onclick="switchLeagueTab('mlb')">MLB</button>
                <button class="league-btn" id="btn-nba" onclick="switchLeagueTab('nba')">NBA</button>
                <button class="league-btn" id="btn-nfl" onclick="switchLeagueTab('nfl')">NFL</button>
                <button class="league-btn" id="btn-nhl" onclick="switchLeagueTab('nhl')">NHL</button>
            </nav>

            <div class="filter-bar">
                <button class="filter-chip active" onclick="setFilter('all', this)">All Games</button>
                <button class="filter-chip" onclick="setFilter('live', this)">Live Only</button>
                <button class="filter-chip" onclick="setFilter('final', this)">Finished</button>
            </div>

            <div class="panel">
                <div class="panel-title">Game Scoreboard</div>
                <div class="scores-grid" id="scores-target">Pre-loading leagues...</div>
            </div>
        </div>

        <div class="panel">
            <div class="panel-title" id="news-title">Top MLB Headlines</div>
            <div class="news-list" id="news-target">Pre-loading data wire...</div>
        </div>
    </main>

    <div class="modal-overlay" id="game-modal">
        <div class="modal-content">
            <button class="close-modal-btn" onclick="closeTracker()">✕</button>
            <div id="tracker-target">Loading stats...</div>
        </div>
    </div>

    <script>
        // Config Paths Mapping
        const leagues = {
            mlb: { path: 'baseball/mlb', rss: 'https://www.espn.com/espn/rss/mlb/news', games: [], news: [] },
            nba: { path: 'basketball/nba', rss: 'https://www.espn.com/espn/rss/nba/news', games: [], news: [] },
            nfl: { path: 'football/nfl', rss: 'https://www.espn.com/espn/rss/nfl/news', games: [], news: [] },
            nhl: { path: 'hockey/nhl', rss: 'https://www.espn.com/espn/rss/nhl/news', games: [], news: [] }
        };

        let currentLeague = 'mlb';
        let currentFilter = 'all';
        let activeGameId = null;
        let trackerInterval = null;

        // FAST LOAD MECHANISM: Fetch data for all leagues in parallel right away
        async function prefetchAllData() {
            const promises = Object.keys(leagues).map(async (key) => {
                try {
                    // Fetch scores
                    const scoreRes = await fetch(`https://site.api.espn.com/apis/site/v2/sports/${leagues[key].path}/scoreboard`);
                    const scoreData = await scoreRes.json();
                    leagues[key].games = scoreData.events || [];

                    // Fetch news
                    const escapedUrl = encodeURIComponent(leagues[key].rss);
                    const newsRes = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${escapedUrl}`);
                    const newsData = await newsRes.json();
                    leagues[key].news = newsData.items || [];
                } catch (e) {
                    console.error(`Pre-loading error on ${key}`);
                }
            });

            await Promise.all(promises);
            
            // Render the active tab immediately once data is cached
            renderScores();
            renderNews();
            updateTimestamp();
        }

        function switchLeagueTab(leagueId) {
            currentLeague = leagueId;
            closeTracker();
            
            document.querySelectorAll('.league-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`btn-${leagueId}`).classList.add('active');
            document.getElementById('news-title').innerText = `Top ${leagueId.toUpperCase()} Headlines`;
            
            // INSTANT RENDER FROM CACHE
            renderScores();
            renderNews();
        }

        function setFilter(type, element) {
            currentFilter = type;
            document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
            element.classList.add('active');
            renderScores();
        }

        function renderScores() {
            const target = document.getElementById('scores-target');
            const games = leagues[currentLeague].games;

            if (!games || games.length === 0) {
                target.innerHTML = '<div class="empty-state">No matches scheduled for today.</div>';
                return;
            }

            const filtered = games.filter(event => {
                const state = event.status.type.state;
                if (currentFilter === 'live') return state === 'in';
                if (currentFilter === 'final') return state === 'post';
                return true;
            });

            if (filtered.length === 0) {
                target.innerHTML = `<div class="empty-state">No slates active matching "${currentFilter}".</div>`;
                return;
            }

            let html = '';
            filtered.forEach(event => {
                const comp = event.competitions[0];
                const home = comp.competitors.find(c => c.homeAway === 'home');
                const away = comp.competitors.find(c => c.homeAway === 'away');
                const isLive = event.status.type.state === 'in';
                const homeRecord = home.records && home.records.length > 0 ? home.records[0].summary : '';
                const awayRecord = away.records && away.records.length > 0 ? away.records[0].summary : '';

                html += `
                    <div class="game-card ${isLive ? 'live' : ''}" onclick="launchGameTracker('${event.id}')">
                        <div class="teams-col">
                            <div class="team-row">
                                <div class="team-info">
                                    <img class="team-logo" src="${away.team.logo || 'https://a.espncdn.com/images/core/assets/misc/sport-placeholder.png'}">
                                    <span class="team-name">${away.team.displayName} <span class="team-record">${awayRecord}</span></span>
                                </div>
                                <span class="team-score">${away.score}</span>
                            </div>
                            <div class="team-row">
                                <div class="team-info">
                                    <img class="team-logo" src="${home.team.logo || 'https://a.espncdn.com/images/core/assets/misc/sport-placeholder.png'}">
                                    <span class="team-name">${home.team.displayName} <span class="team-record">${homeRecord}</span></span>
                                </div>
                                <span class="team-score">${home.score}</span>
                            </div>
                        </div>
                        <div class="status-col">
                            <span class="status-text">${event.status.type.detail}</span>
                        </div>
                    </div>
                `;
            });
            target.innerHTML = html;
        }

        function renderNews() {
            const target = document.getElementById('news-target');
            const news = leagues[currentLeague].news;

            if (!news || news.length === 0) {
                target.innerHTML = '<div class="empty-state">No headlines found.</div>';
                return;
            }

            let html = '';
            news.slice(0, 6).forEach(item => {
                html += `
                    <div class="news-card">
                        <a class="news-link" href="${item.link}" target="_blank">${item.title}</a>
                        <p class="news-desc">${item.description || ''}</p>
                    </div>
                `;
            });
            target.innerHTML = html;
        }

        function launchGameTracker(gameId) {
            activeGameId = gameId;
            document.getElementById('game-modal').style.display = 'flex';
            document.getElementById('tracker-target').innerHTML = '<div class="empty-state">Loading boxscore...</div>';
            loadGameSummary();
            if (trackerInterval) clearInterval(trackerInterval);
            trackerInterval = setInterval(loadGameSummary, 15000);
        }

        function closeTracker() {
            activeGameId = null;
            document.getElementById('game-modal').style.display = 'none';
            if (trackerInterval) clearInterval(trackerInterval);
        }

        async function loadGameSummary() {
            if (!activeGameId) return;
            try {
                const response = await fetch(`https://site.api.espn.com/apis/site/v2/sports/${leagues[currentLeague].path}/summary?event=${activeGameId}`);
                const data = await response.json();
                const header = data.header;
                const comp = header.competitions[0];
                const home = comp.competitors.find(c => c.homeAway === 'home');
                const away = comp.competitors.find(c => c.homeAway === 'away');
                
                let html = `
                    <div class="stat-board-header">
                        <div class="board-team">
                            <img src="${away.team.logo || 'https://a.espncdn.com/images/core/assets/misc/sport-placeholder.png'}">
                            <div class="board-team-name">${away.team.displayName}</div>
                        </div>
                        <div class="board-center-score">
                            <div>${away.score} - ${home.score}</div>
                            <div class="board-status-badge">${header.status.type.detail}</div>
                        </div>
                        <div class="board-team">
                            <img src="${home.team.logo || 'https://a.espncdn.com/images/core/assets/misc/sport-placeholder.png'}">
                            <div class="board-team-name">${home.team.displayName}</div>
                        </div>
                    </div>
                `;

                if (data.situation && data.situation.lastPlay) {
                    html += `
                        <div class="stat-section-title">Current Situation / Last Play</div>
                        <div class="play-by-play-box">${data.situation.lastPlay.text}</div>
                    `;
                }

                if (data.boxscore && data.boxscore.teams && data.boxscore.teams.length > 0) {
                    html += `<div class="stat-section-title">Team Stats Summary</div>`;
                    const teamStats = data.boxscore.teams;
                    const homeStats = teamStats.find(t => t.team.id === home.id);
                    const awayStats = teamStats.find(t => t.team.id === away.id);
                    
                    if (homeStats && homeStats.statistics && homeStats.statistics.length > 0) {
                        homeStats.statistics.forEach((stat, idx) => {
                            const label = stat.label;
                            const hVal = stat.displayValue;
                            const aVal = awayStats.statistics[idx] ? awayStats.statistics[idx].displayValue : '-';
                            html += `
                                <div class="stat-row-data">
                                    <span style="font-weight:700; width:60px;">${aVal}</span>
                                    <span class="stat-label">${label}</span>
                                    <span style="font-weight:700; text-align:right; width:60px;">${hVal}</span>
                                </div>
                            `;
                        });
                    }
                }

                document.getElementById('tracker-target').innerHTML = html;
            } catch (err) {
                document.getElementById('tracker-target').innerHTML = '<div class="empty-state">Boxscore stats loading...</div>';
            }
        }

        function updateTimestamp() {
            const now = new Date();
            document.getElementById('refresh-time').innerText = `Live Cache: ${now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}`;
        }

        // Silent background update loops (No spinners)
        async function silentRefresh() {
            for (const key of Object.keys(leagues)) {
                try {
                    const scoreRes = await fetch(`https://site.api.espn.com/apis/site/v2/sports/${leagues[key].path}/scoreboard`);
                    const scoreData = await scoreRes.json();
                    leagues[key].games = scoreData.events || [];
                } catch(e){}
            }
            renderScores();
            updateTimestamp();
        }

        // Run Engine
        prefetchAllData();
        setInterval(silentRefresh, 30000); // Silent refresh updates background data smoothly every 30 seconds
    </script>
</body>
</html>
