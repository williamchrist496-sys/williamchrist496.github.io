<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Sports HQ</title>
    <style>
        :root {
            --bg-main: #0b0e11;
            --bg-card: #151a22;
            --bg-nav: #1e2530;
            --accent: #00ff88;
            --text-main: #ffffff;
            --text-muted: #8a99ad;
            --border: #242f41;
            --danger: #ff4a4a;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            padding-bottom: 60px;
        }

        .app-header {
            background-color: var(--bg-nav);
            padding: 15px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .app-title {
            font-size: 1.3rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(90deg, #fff, var(--text-muted));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .refresh-indicator {
            font-size: 0.75rem;
            color: var(--accent);
            background: rgba(0, 255, 136, 0.1);
            padding: 4px 8px;
            border-radius: 12px;
            font-weight: 600;
        }

        .app-layout {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            max-width: 1600px;
            margin: 20px auto;
            padding: 0 15px;
        }

        @media(min-width: 1024px) {
            .app-layout {
                grid-template-columns: 1.2fr 1fr;
            }
        }

        .league-selector {
            display: flex;
            background-color: var(--bg-nav);
            padding: 6px;
            border-radius: 12px;
            gap: 5px;
            margin-bottom: 15px;
            border: 1px solid var(--border);
        }

        .league-btn {
            flex: 1;
            background: none;
            border: none;
            color: var(--text-muted);
            padding: 10px;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            font-size: 0.9rem;
        }

        .league-btn.active {
            background-color: var(--bg-card);
            color: var(--accent);
        }

        .filter-bar {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
        }

        .filter-chip {
            background: var(--bg-nav);
            border: 1px solid var(--border);
            color: var(--text-muted);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
        }

        .filter-chip.active {
            background: var(--accent);
            color: var(--bg-main);
            border-color: var(--accent);
        }

        .panel {
            background-color: var(--bg-card);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid var(--border);
            margin-bottom: 20px;
        }

        .panel-title {
            font-size: 1.1rem;
            font-weight: 700;
            margin-top: 0;
            margin-bottom: 15px;
        }

        .scores-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .game-card {
            background-color: var(--bg-nav);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: border-color 0.2s ease;
        }

        .game-card:hover {
            border-color: var(--accent);
        }

        .game-card.selected {
            border-color: var(--accent);
            background-color: rgba(0, 255, 136, 0.03);
        }

        .teams-col {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .team-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-right: 20px;
        }

        .team-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .team-logo {
            width: 24px;
            height: 24px;
            object-fit: contain;
        }

        .team-name { font-weight: 600; font-size: 0.95rem; }
        .team-score { font-size: 1.2rem; font-weight: 800; }
        .status-col { width: 100px; text-align: right; border-left: 1px solid var(--border); padding-left: 10px; }
        .status-text { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; }
        .game-card.live .status-text { color: var(--accent); }

        /* LIVE DETAILED STAT BOARD LAYOUT */
        .stat-board-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--bg-nav);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 15px;
            border: 1px solid var(--border);
        }
        .board-team { text-align: center; flex: 1; }
        .board-team img { width: 45px; height: 45px; }
        .board-team-name { font-size: 0.9rem; font-weight: 700; margin-top: 5px; }
        .board-center-score { font-size: 1.8rem; font-weight: 900; text-align: center; padding: 0 15px; }
        
        .stat-row-data {
            display: flex;
            justify-content: space-between;
            padding: 8px 5px;
            border-bottom: 1px solid #1e2530;
            font-size: 0.9rem;
        }
        .stat-label { color: var(--text-muted); font-weight: 500; }
        .play-by-play-box {
            background: #0b0e11;
            padding: 12px;
            border-radius: 8px;
            border-left: 3px solid var(--accent);
            font-size: 0.88rem;
            line-height: 1.4;
            margin-top: 10px;
        }

        .news-card { border-bottom: 1px solid var(--border); padding-bottom: 12px; margin-bottom: 12px; }
        .news-link { color: var(--text-main); text-decoration: none; font-weight: 600; display: block; margin-bottom: 4px; font-size: 0.95rem;}
        .news-link:hover { color: var(--accent); }
        .news-desc { font-size: 0.85rem; color: var(--text-muted); margin: 0; }
        .empty-state { text-align: center; color: var(--text-muted); padding: 20px 0; font-size: 0.9rem; }
    </style>
</head>
<body>

    <header class="app-header">
        <div class="app-title">PRO SPORTS HQ</div>
        <div class="refresh-indicator" id="refresh-time">Syncing System Live</div>
    </header>

    <main class="app-layout">
        <div>
            <nav class="league-selector">
                <button class="league-btn active" onclick="changeLeague('mlb', 'baseball/mlb', 'https://www.espn.com/espn/rss/mlb/news')">MLB</button>
                <button class="league-btn" onclick="changeLeague('nba', 'basketball/nba', 'https://www.espn.com/espn/rss/nba/news')">NBA</button>
                <button class="league-btn" onclick="changeLeague('nfl', 'football/nfl', 'https://www.espn.com/espn/rss/nfl/news')">NFL</button>
                <button class="league-btn" onclick="changeLeague('nhl', 'hockey/nhl', 'https://www.espn.com/espn/rss/nhl/news')">NHL</button>
            </nav>

            <div class="filter-bar">
                <button class="filter-chip active" onclick="setFilter('all', this)">All Slates</button>
                <button class="filter-chip" onclick="setFilter('live', this)">Live Matchups</button>
                <button class="filter-chip" onclick="setFilter('final', this)">Completed</button>
            </div>

            <div class="panel">
                <div class="panel-title">Today's Schedule</div>
                <div class="scores-grid" id="scores-target">Loading real-time feeds...</div>
            </div>
        </div>

        <div>
            <div class="panel" id="match-tracker-panel" style="display: none;">
                <div class="panel-title" style="display:flex; justify-content:space-between;">
                    <span>Live Game Centre</span>
                    <span style="color:var(--accent); font-size:0.8rem; cursor:pointer;" onclick="closeTracker()">✕ Close</span>
                </div>
                <div id="tracker-target">Select a game card to stream stat engine telemetry.</div>
            </div>

            <div class="panel">
                <div class="panel-title" id="news-title">Top MLB Headlines</div>
                <div class="news-list" id="news-target">Loading news wire...</div>
            </div>
        </div>
    </main>

    <script>
        let currentSportPath = 'baseball/mlb';
        let currentRssUrl = 'https://www.espn.com/espn/rss/mlb/news';
        let currentFilter = 'all';
        let cachedGames = [];
        let activeGameId = null;
        let trackerInterval = null;

        function changeLeague(leagueId, path, rss) {
            currentSportPath = path;
            currentRssUrl = rss;
            closeTracker();
            document.querySelectorAll('.league-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('news-title').innerText = `Top ${leagueId.toUpperCase()} Headlines`;
            fetchScores();
            fetchNews();
        }

        function setFilter(type, element) {
            currentFilter = type;
            document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
            element.classList.add('active');
            renderScores();
        }

        async function fetchScores() {
            try {
                const response = await fetch(`https://site.api.espn.com/apis/site/v2/sports/${currentSportPath}/scoreboard`);
                const data = await response.json();
                cachedGames = data.events || [];
                renderScores();
                const now = new Date();
                document.getElementById('refresh-time').innerText = `Live: ${now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}`;
            } catch (e) {
                document.getElementById('scores-target').innerHTML = '<div class="empty-state">Telemetric sync down.</div>';
            }
        }

        function renderScores() {
            const target = document.getElementById('scores-target');
            if (cachedGames.length === 0) {
                target.innerHTML = '<div class="empty-state">No matchups scheduled for today.</div>';
                return;
            }

            let html = '';
            const filtered = cachedGames.filter(event => {
                const state = event.status.type.state;
                if (currentFilter === 'live') return state === 'in';
                if (currentFilter === 'final') return state === 'post';
                return true;
            });

            if (filtered.length === 0) {
                target.innerHTML = `<div class="empty-state">No games under "${currentFilter}" filter.</div>`;
                return;
            }

            filtered.forEach(event => {
                const comp = event.competitions[0];
                const home = comp.competitors.find(c => c.homeAway === 'home');
                const away = comp.competitors.find(c => c.homeAway === 'away');
                const isLive = event.status.type.state === 'in';
                const isSelected = event.id === activeGameId ? 'selected' : '';

                html += `
                    <div class="game-card ${isLive ? 'live' : ''} ${isSelected}" onclick="launchGameTracker('${event.id}')">
                        <div class="teams-col">
                            <div class="team-row">
                                <div class="team-info">
                                    <img class="team-logo" src="${away.team.logo || ''}" onerror="this.style.opacity=0">
                                    <span class="team-name">${away.team.displayName}</span>
                                </div>
                                <span class="team-score">${away.score}</span>
                            </div>
                            <div class="team-row">
                                <div class="team-info">
                                    <img class="team-logo" src="${home.team.logo || ''}" onerror="this.style.opacity=0">
                                    <span class="team-name">${home.team.displayName}</span>
                                </div>
                                <span class="team-score">${home.score}</span>
                            </div>
                        </div>
                        <div class="status-col">
                            <span class="status-text">${event.status.type.detail}</span>
                        </div>
                    </div>
                `;
            });
            target.innerHTML = html;
        }

        function closeTracker() {
            activeGameId = null;
            document.getElementById('match-tracker-panel').style.display = 'none';
            if (trackerInterval) clearInterval(trackerInterval);
            renderScores();
        }

        function launchGameTracker(gameId) {
            activeGameId = gameId;
            document.getElementById('match-tracker-panel').style.display = 'block';
            
            // Highlight selected card visually
            renderScores();
            
            // Fetch instantly, then spin up loop loop
            loadGameSummary();
            if (trackerInterval) clearInterval(trackerInterval);
            trackerInterval = setInterval(loadGameSummary, 20000); // refresh panel data every 20s
        }

        async function loadGameSummary() {
            if (!activeGameId) return;
            const container = document.getElementById('tracker-target');
            try {
                const response = await fetch(`https://site.web.api.espn.com/apis/site/v2/sports/${currentSportPath}/summary?event=${activeGameId}`);
                const data = await response.json();
                
                const header = data.header;
                const comp = header.competitions[0];
                const home = comp.competitors.find(c => c.homeAway === 'home');
                const away = comp.competitors.find(c => c.homeAway === 'away');
                
                // Build live tracker interface mapping
                let html = `
                    <div class="stat-board-header">
                        <div class="board-team">
                            <img src="${away.team.logo || ''}">
                            <div class="board-team-name">${away.team.abbreviation}</div>
                        </div>
                        <div class="board-center-score">
                            <div>${away.score} - ${home.score}</div>
                            <div style="font-size:0.75rem; color:var(--accent); font-weight:600; margin-top:5px;">${header.status.type.detail}</div>
                        </div>
                        <div class="board-team">
                            <img src="${home.team.logo || ''}">
                            <div class="board-team-name">${home.team.abbreviation}</div>
                        </div>
                    </div>
                `;

                // Add Live Play-By-Play if available
                if (data.plays && data.plays.length > 0) {
                    const lastPlay = data.plays[data.plays.length - 1];
                    html += `
                        <div style="font-weight:700; font-size:0.85rem; margin-bottom:5px; text-transform:uppercase; color:var(--text-muted)">Latest Play</div>
                        <div class="play-by-day-box">${lastPlay.text}</div>
                    `;
                }

                // Add Box Score Box Team Comparison Matrix
                if (data.boxscore && data.boxscore.teams) {
                    html += `<div style="font-weight:700; font-size:0.85rem; margin:15px 0 8px 0; text-transform:uppercase; color:var(--text-muted)">Team Stats Comparison</div>`;
                    
                    const teamStats = data.boxscore.teams;
                    const homeStats = teamStats.find(t => t.team.id === home.id);
                    const awayStats = teamStats.find(t => t.team.id === away.id);
                    
                    if(homeStats && homeStats.statistics && homeStats.statistics.length > 0) {
                        // dynamic render up to 6 core matching stat elements
                        for(let i=0; i < Math.min(6, homeStats.statistics.length); i++) {
                            const label = homeStats.statistics[i].label;
                            const hVal = homeStats.statistics[i].displayValue;
                            const aVal = awayStats.statistics[i].displayValue;
                            html += `
                                <div class="stat-row-data">
                                    <span style="font-weight:600; width:40px;">${aVal}</span>
                                    <span class="stat-label">${label}</span>
                                    <span style="font-weight:600; text-align:right; width:40px;">${hVal}</span>
                                </div>
                            `;
                        }
                    } else {
                        html += `<div class="empty-state">Stats will compile at tip-off.</div>`;
                    }
                }

                // Add Game Metadata (Arena, Broadcast Station Network)
                if (comp.venue || comp.broadcasts) {
                    const venue = comp.venue ? comp.venue.fullName : 'N/A';
                    const network = comp.broadcasts && comp.broadcasts.length > 0 ? comp.broadcasts[0].media.shortName : 'N/A';
                    html += `
                        <div style="margin-top:15px; font-size:0.78rem; color:var(--text-muted); line-height:1.5;">
                            <div>📍 <b>Venue:</b> ${venue}</div>
                            <div>📺 <b>Network:</b> ${network}</div>
                        </div>
                    `;
                }

                container.innerHTML = html;
            } catch (err) {
                container.innerHTML = '<div class="empty-state">Telemetric details offline for this slate.</div>';
            }
        }

        async function fetchNews() {
            const target = document.getElementById('news-target');
            try {
                const escapedUrl = encodeURIComponent(currentRssUrl);
                const response = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${escapedUrl}`);
                const data = await response.json();

                if (!data.items || data.items.length === 0) {
                    target.innerHTML = '<div class="empty-state">No current headlines found.</div>';
                    return;
                }

                let html = '';
                data.items.slice(0, 5).forEach(item => {
                    html += `
                        <div class="news-card">
                            <a class="news-link" href="${item.link}" target="_blank">${item.title}</a>
                            <p class="news-desc">${item.description || ''}</p>
                        </div>
                    `;
                });
                target.innerHTML = html;
            } catch (e) {
                target.innerHTML = '<div class="empty-state">News wire connection reset.</div>';
            }
        }

        // Init
        fetchScores();
        fetchNews();
        setInterval(fetchScores, 30000);
        setInterval(fetchNews, 120000);
    </script>
</body>
</html>
